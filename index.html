<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="author" content="Berefire">
  <meta name="description"
    content="Social links profile built with HTML and CSS, showcasing clean semantics, accesiblity, and responsive design.">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <link rel="preload" href="./css/main.css" as="style">
  <link rel="stylesheet" href="./css/main.css" type="text/css">



  <title>Frontend Mentor | Social links profile</title>

</head>

<body class="cover">
  <main class="page">
    <article class="profile-user box stack text-center" aria-labelledby="profile-heading">
      <img class="profile-user__image" src="./assets/images/avatar-jessica.jpeg"
        alt="Picture profile of Jessica Randall" width="176" height="176" />

      <div class="stack-xs">
        <h1 class="profile-user__name">
          Jessica Randall
        </h1>
        <p class="profile-user__place">London, United Kingdom</p>
      </div>

      <p class="profile-user__career"><blockquote>"Front-end developer and avid reader."</blockquote></p>

      <nav class="profile-user__nav" aria-label="Social media links">
        <ul class="stack-s">
          <li class="profile-user__list">
            <a class="profile-user__link" href="#" target="_blank" rel="noopener noreferrer" aria-label="Github (opens in a new tab)">
              Github
            </a>
          </li>
          <li class="profile-user__list ">
            <a class="profile-user__link" href="#" target="_blank" rel="noopener noreferrer"
              aria-label="Frontend Mentor (opens in a new tab)">
              Frontend Mentor
            </a>
          </li>
          <li class="profile-user__list">
            <a class="profile-user__link" href="#" target="_blank" rel="noopener noreferrer"
              aria-label="LinkedIn (opens in a new tab)">
              LinkedIn
            </a>
          </li>
          <li class="profile-user__list">
            <a class="profile-user__link" href="#" target="_blank" rel="noopener noreferrer"
              aria-label="Twitter (opens in a new tab)">
              Twitter
            </a>
          </li>
          <li class="profile-user__list">
            <a class="profile-user__link" href="#" target="_blank" rel="noopener noreferrer"
              aria-label="Instagram (opens in a new tab)">
              Instagram
            </a>
          </li>
        </ul>
      </nav>

    </article>
  </main>
  <footer class="attribution text-center">
    Challenge by <a class="link" href="https://www.frontendmentor.io?ref=challenge" target="_blank"
      rel="noopener noreferrer" aria-label="Frontend Mentor (opens in a new tab)">Frontend
      Mentor</a>.
    Coded by <a class="link" target="_blank" rel="noopener noreferrer" aria-label="Author (opens in a new tab)"
      href="#">Berefire</a>.
    </div>
  </footer>

</body>

</html>
